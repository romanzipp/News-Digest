{{define "content"}}
{{template "masthead" .}}
<div class="max-w-2xl mx-auto px-12 py-8">
    <h2 class="text-2xl font-bold mb-6" style="font-family: var(--font-masthead)">FreshRSS Configuration</h2>

    <div class="card">
        <form method="POST" action="/freshrss">
            <div class="mb-4">
                <label class="block text-xs uppercase tracking-wider text-muted mb-1">FreshRSS Base URL</label>
                <input type="url" name="url" value="{{if .FreshRSS}}{{.FreshRSS.URL}}{{end}}" required class="form-input" placeholder="https://rss.example.com">
            </div>
            <div class="mb-4">
                <label class="block text-xs uppercase tracking-wider text-muted mb-1">Username</label>
                <input type="text" name="username" value="{{if .FreshRSS}}{{.FreshRSS.Username}}{{end}}" required class="form-input">
            </div>
            <div class="mb-6">
                <label class="block text-xs uppercase tracking-wider text-muted mb-1">API Password</label>
                <input type="password" name="api_password" value="{{if .FreshRSS}}{{.FreshRSS.APIPassword}}{{end}}" required class="form-input">
            </div>
            <div class="flex gap-3">
                <button type="submit" class="btn btn-primary">Save</button>
                <button type="submit" formaction="/freshrss/test" class="btn">Test Connection</button>
            </div>
        </form>
    </div>

    <div class="mt-6 text-center">
        <a href="/feeds" class="text-xs text-muted underline">&larr; Back to feeds</a>
    </div>
</div>
{{end}}
