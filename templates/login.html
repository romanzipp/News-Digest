{{define "content"}}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="masthead-title text-5xl mb-2">The Daily Digest</h1>
            <p class="text-sm text-muted italic">"All the news worth summarising"</p>
        </div>

        <div class="card">
            <h2 class="text-lg font-bold mb-4 uppercase tracking-wider text-center">Sign In</h2>

            {{if .Error}}
            <div class="mb-4 text-sm text-cat-economy border border-cat-economy/30 px-3 py-2">
                {{.Error}}
            </div>
            {{end}}

            <form method="POST" action="/login">
                <div class="mb-4">
                    <label class="block text-xs uppercase tracking-wider text-muted mb-1">Email</label>
                    <input type="email" name="email" value="{{.Email}}" required autofocus class="form-input">
                </div>
                <div class="mb-6">
                    <label class="block text-xs uppercase tracking-wider text-muted mb-1">Password</label>
                    <input type="password" name="password" required class="form-input">
                </div>
                <button type="submit" class="btn btn-primary w-full">Sign In</button>
            </form>

            {{if .RegistrationEnabled}}
            <p class="mt-4 text-center text-xs text-muted">
                No account? <a href="/register" class="underline text-ink">Register</a>
            </p>
            {{end}}
        </div>
    </div>
</div>
{{end}}
