{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Title}}{{.Title}} — {{end}}The Daily Digest</title>
    <link rel="stylesheet" href="/static/css/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body class="min-h-screen">
    {{if .Flash}}
    <div class="px-12 py-3 text-sm border-b border-rule bg-cream-dark">
        {{.Flash}}
    </div>
    {{end}}
    {{template "content" .}}
</body>
</html>{{end}}
