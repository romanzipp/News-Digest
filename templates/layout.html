{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Title}}{{.Title}} — {{end}}The Daily Digest</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Daily Digest">
    <link rel="stylesheet" href="/static/css/output.css?v={{version}}">
    <script src="/static/js/htmx.min.js?v={{version}}"></script>
</head>
<body class="min-h-screen">
    {{if .Flash}}
    <div class="px-12 py-3 text-sm border-b border-rule bg-cream-dark">
        {{.Flash}}
    </div>
    {{end}}
    {{template "content" .}}
</body>
</html>{{end}}
