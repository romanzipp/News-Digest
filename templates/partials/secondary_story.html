{{define "secondary_story"}}
<a href="/read/{{.ItemID}}" target="_blank" rel="noopener" class="article-link block {{if .IsRead}}is-read{{end}}">
    {{template "category_slug" .}}
    <h2 class="secondary-headline">{{.Headline}}</h2>
    {{if .ImageURL}}
    <img src="{{proxyURL .ImageURL}}" alt="" class="w-full h-[120px] object-cover rounded-sm">
    {{else}}
    <div class="image-placeholder h-[120px]">{{lower .Category}}</div>
    {{end}}
    <div class="text-base leading-relaxed mt-3 mb-3 article-desc">{{.TLDR}}</div>
    {{if .Bullets}}
    <ul class="story-bullets text-[13px] mb-2.5">
        {{range .Bullets}}<li>{{.}}</li>{{end}}
    </ul>
    {{end}}
    {{template "byline" .}}
</a>
{{end}}
