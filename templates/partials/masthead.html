{{define "masthead"}}
<header class="double-rule">
    <div class="content-container pt-5 sm:pt-7 pb-4">
        <div class="flex flex-col sm:grid sm:grid-cols-[1fr_auto_1fr] items-center gap-1 sm:gap-0 mb-3 text-[11px] uppercase tracking-wider text-muted">
            <span class="hidden sm:block">{{if .User}}{{.User.Username}}{{else}}Guest{{end}}</span>
            <span>{{.DateFormatted}}</span>
            <span class="sm:text-right">
                <a href="/feeds" class="hover:text-ink">Feeds</a>
                ·
                <a href="/interests" class="hover:text-ink">Interests</a>
                ·
                <a href="/sections" class="hover:text-ink">Sections</a>
                {{if .User}}
                ·
                <form method="POST" action="/logout" class="inline">
                    <button type="submit" class="hover:text-ink cursor-pointer" style="font-family:inherit;font-size:inherit;background:none;border:none;padding:0;text-transform:uppercase;letter-spacing:inherit;color:inherit">Logout</button>
                </form>
                {{end}}
            </span>
        </div>
        <a href="/" class="masthead-title block no-underline" style="text-decoration:none;color:inherit">The Daily Digest</a>
        <div class="text-center mt-2 text-[13px] text-muted italic">
            "All the news worth summarising"
        </div>
    </div>
</header>
{{end}}
