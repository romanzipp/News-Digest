{{define "vote_buttons"}}
<span class="flex gap-1 items-center">
    <span hx-target="this" hx-swap="outerHTML">
        <button
            hx-post="/votes"
            hx-vals='{"item_id": "{{.ItemID}}", "value": "1"}'
            class="vote-btn {{if eq .UserVote 1}}vote-btn-active{{end}}">&#9650; more</button>
        <button
            hx-post="/votes"
            hx-vals='{"item_id": "{{.ItemID}}", "value": "-1"}'
            class="vote-btn {{if eq .UserVote -1}}vote-btn-active{{end}}">&#9660; less</button>
    </span>
    <span hx-target="this" hx-swap="innerHTML">
        <button
            hx-get="/copy/{{.ItemID}}"
            class="vote-btn" title="Copy markdown">&#128203;</button>
    </span>
</span>
{{end}}
