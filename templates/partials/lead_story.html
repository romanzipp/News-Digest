{{define "lead_story"}}
<a href="{{.SourceURL}}" target="_blank" rel="noopener" class="article-link grid grid-cols-[1.3fr_1fr] gap-7">
    <div>
        {{template "category_slug" .}}
        <h1 class="lead-headline">{{.Headline}}</h1>
        <div class="tldr mb-4">{{.TLDR}}</div>
        {{if .Bullets}}
        <ul class="story-bullets mb-4">
            {{range .Bullets}}<li>{{.}}</li>{{end}}
        </ul>
        {{end}}
        {{template "byline" .}}
    </div>
    <div>
        {{if .ImageURL}}
        <img src="{{proxyURL .ImageURL}}" alt="" class="w-full h-[260px] object-cover rounded-sm">
        {{else}}
        <div class="image-placeholder h-[260px]">hero · {{lower .Category}}</div>
        {{end}}
    </div>
</a>
{{end}}
