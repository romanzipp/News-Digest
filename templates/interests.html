{{define "content"}}
{{template "masthead" .}}
<div class="max-w-2xl mx-auto px-12 py-8">
    <h2 class="text-2xl font-bold mb-6" style="font-family: var(--font-masthead)">Your Interests</h2>

    <div class="card">
        <form method="POST" action="/interests">
            <div class="mb-6">
                <label class="block text-xs uppercase tracking-wider text-muted mb-2">Topics I care deeply about</label>
                <textarea name="interests_deep" rows="3" class="form-input">{{.InterestsDeep}}</textarea>
            </div>

            <div class="mb-6">
                <label class="block text-xs uppercase tracking-wider text-muted mb-2">Topics I want less of</label>
                <textarea name="interests_less" rows="2" class="form-input">{{.InterestsLess}}</textarea>
            </div>

            <div class="mb-6">
                <label class="block text-xs uppercase tracking-wider text-muted mb-2">Languages I read</label>
                <input type="text" name="languages" value="{{.Languages}}" class="form-input">
            </div>

            <div class="mb-8">
                <label class="block text-xs uppercase tracking-wider text-muted mb-2">Anything else the AI should know</label>
                <textarea name="interests_other" rows="2" class="form-input">{{.InterestsOther}}</textarea>
            </div>

            <button type="submit" class="btn btn-primary">Save Interests</button>
        </form>
    </div>

    <div class="mt-6 text-center">
        <a href="/" class="text-xs text-muted underline">&larr; Back to digest</a>
    </div>
</div>
{{end}}
